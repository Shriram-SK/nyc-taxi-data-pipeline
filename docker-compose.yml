# ---------------------------------------------------------------
# docker-compose.yml — Apache Airflow (2.x) local dev setup
#
# Services
#   postgres   : Airflow metadata database
#   airflow-init : one-shot DB migration + admin user creation
#   webserver  : Airflow UI  → http://localhost:8080
#   scheduler  : DAG scheduler process
#
# Usage
#   docker compose up -d
#   docker compose down -v   # also removes volumes
# ---------------------------------------------------------------

version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "change-me-in-production"
    # Forward host env vars your DAGs may need
    DUCKDB_PATH: /opt/airflow/data/db/nyc_taxi.duckdb
    DBT_PROFILES_DIR: /opt/airflow/dbt
    # Packages installed by the official image's entrypoint before Airflow starts.
    # This runs in every service (init, webserver, scheduler) without a custom image.
    _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.8.3 dbt-duckdb==1.8.2 duckdb==1.0.0"
  volumes:
    - ./dags:/opt/airflow/dags            # DAG files
    - ./dbt:/opt/airflow/dbt              # dbt project (for dbt operator)
    - ./input:/opt/airflow/data/input     # raw input files
    - airflow-data:/opt/airflow/data/db    # persists DuckDB file across restarts
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - airflow-net

services:
  # ------------------------------------------------------------------
  postgres:
  # ------------------------------------------------------------------
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - airflow-net

  # ------------------------------------------------------------------
  airflow-init:
  # ------------------------------------------------------------------
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/db && chmod 777 /opt/airflow/data/db
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ------------------------------------------------------------------
  webserver:
  # ------------------------------------------------------------------
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # give the webserver time to boot before first check
    restart: unless-stopped

  # ------------------------------------------------------------------
  scheduler:
  # ------------------------------------------------------------------
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-db:
  airflow-logs:
  airflow-data:    # persists DuckDB file and any other runtime data

networks:
  airflow-net:
    driver: bridge
